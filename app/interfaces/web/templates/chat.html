<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KazmaAI Chat - كازما أي آي دردشة</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #3b82f6;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            background: var(--surface);
            padding: 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }
        
        header h1 {
            color: var(--primary);
            font-size: 24px;
        }
        
        .chat-container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 200px);
            background: var(--surface);
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        
        .message {
            margin-bottom: 16px;
            padding: 12px 16px;
            border-radius: 8px;
            max-width: 80%;
        }
        
        .message.user {
            background: var(--primary);
            color: white;
            margin-right: auto;
            border-bottom-right-radius: 4px;
        }
        
        .message.agent {
            background: var(--bg);
            color: var(--text);
            margin-left: auto;
            border-bottom-left-radius: 4px;
        }
        
        .chat-input {
            display: flex;
            gap: 12px;
            padding: 20px;
            border-top: 1px solid var(--border);
            background: var(--surface);
        }
        
        .chat-input input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
        }
        
        .chat-input input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .chat-input button {
            padding: 12px 24px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .chat-input button:hover {
            background: var(--primary-light);
        }
        
        .nav {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .nav a {
            color: var(--text-light);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        
        .nav a.active {
            background: var(--primary);
            color: white;
        }
        
        .nav a:hover {
            background: var(--bg);
        }
        
        .typing {
            color: var(--text-light);
            font-style: italic;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>🤖 KazmaAI Chat / دردشة كازما أي آي</h1>
        </div>
    </header>
    
    <div class="container">
        <nav class="nav">
            <a href="/chat" class="active">💬 Chat / دردشة</a>
            <a href="/projects">📁 Projects / المشاريع</a>
            <a href="/create">🎨 Create / إبداع</a>
            <a href="/status">📊 Status / الحالة</a>
        </nav>
        
        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <div class="message agent">
                    مرحباً! أنا كازما أي آي، وكيل ذكاء اصطناعي عبر المنصات.
                    <br><br>
                    Hello! I'm KazmaAI, a cross-platform AI agent.
                </div>
            </div>
            
            <form class="chat-input" id="chatForm">
                <input 
                    type="text" 
                    name="message" 
                    placeholder="اكتب رسالتك... / Type your message..."
                    autocomplete="off"
                    required
                >
                <button type="submit">إرسال / Send</button>
            </form>
        </div>
    </div>
    
    <script>
        const chatForm = document.getElementById('chatForm');
        const chatMessages = document.getElementById('chatMessages');
        
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(chatForm);
            const message = formData.get('message');
            
            // Add user message to chat
            addMessage(message, 'user');
            
            // Clear input
            chatForm.querySelector('input').value = '';
            
            // Show typing indicator
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing';
            typingDiv.textContent = 'كازما تكتب... / Kazma is typing...';
            chatMessages.appendChild(typingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            // Send to API
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `message=${encodeURIComponent(message)}`,
                });
                
                const data = await response.json();
                
                // Remove typing indicator
                typingDiv.remove();
                
                // Add agent response
                addMessage(data.response, 'agent');
                
            } catch (error) {
                typingDiv.remove();
                addMessage('Error: ' + error.message, 'agent');
            }
        });
        
        function addMessage(text, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = text;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
    </script>
</body>
</html>
